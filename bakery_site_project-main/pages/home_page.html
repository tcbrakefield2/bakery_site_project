<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaBelle Bakery</title>
  <meta name="description" content="Fresh cookies, pastries, and cakes baked daily at LaBelle Bakery.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../scripts/favicon.svg">

  <style>
    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url("../scripts/background.svg");
      background-size: 200px;
      background-repeat: repeat;

      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
    }

    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-header {
      background-color: #ff90d6;
      padding: 20px 0;
    }

    .nav a {
      text-decoration: none;
      color: #441c2d;
      margin-left: 25px;
      font-weight: bold;
    }

    .nav a:hover {
      color: #c2185b;
    }

    .card {
      background-color: #f7edd1;
      border: none;
    }

    /* ===== Footer ===== */
    .site-footer {
      background-color: #ff90d6;
      padding: 15px 0;
      text-align: center;
    }

  </style>
</head>

<body>

  <header class="site-header">
    <div class="container header-flex">
      <h1 class="brand">
        <img src="../scripts/logo.svg" alt="LaBelle Bakery Logo" width="150" height="150" style="vertical-align: middle; margin-right: 10px;">
      </h1>
      <nav class="nav">
        <a href="../pages/about_page.html">About</a>
        <a href="../pages/menu_page.html">Menu</a>
        <a href="../pages/contact_page.html">Contact</a>
        <a href="../pages/specials_page.html">Specials</a>
        <a href="../pages/order_pages.html" id="order-link">Order</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div>
          <h2>Freshly baked every morning</h2>
          <p>Baked fresh every morning, from local ingredients sourced daily.</p>
        </div>
      </div>
    </section>

    <section id="contact" class="container contact-section">
      <div>
        <h3>Contact</h3>
        <p>
          Visit us: 123 Morning Lane<br>
          Hours: Mon–Sat 7am–3pm
        </p>
        <p>Email: hello@LaBellebakery.example</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© LaBelle Bakery — Fresh every day.</p>
    </div>
  </footer>

  <script>
  const orderLink = document.getElementById('order-link');

  orderLink.addEventListener('click', function(event){
    event.preventDefault(); // prevent default navigation
    window.location.href = '../scripts/login_page.html'; // go to login page
  });
</script>

</body>
</html>
