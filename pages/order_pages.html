<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LaBelle Bakery</title>
  <meta name="description" content="Fresh cookies, pastries, and cakes baked daily at LaBelle Bakery.">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="../scripts/favicon.svg">

  <style>
    /* ===== Base Styles ===== */
    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url("../scripts/background.svg");
      background-size: 200px;
      background-repeat: repeat;

      display: flex;
      flex-direction: column;
    }

    main{
      flex: 1;
    }

    /* ===== Layout ===== */
    .container {
      width: 90%;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ===== Header ===== */
    .site-header {
      background-color: #ff90d6;
      padding: 20px 0;
    }

    .brand {
      margin: 0;
      color: #441c2d;
    }

    /* ===== Navigation ===== */
    .nav a {
      text-decoration: none;
      color: #441c2d;
      margin-left: 25px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .nav a:hover {
      color: #c2185b;
    }

    /* ===== Footer ===== */
    .site-footer {
      background-color: #ff90d6;
      padding: 15px 0;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="container">
      <h1 class="brand">
        <img src="../scripts/logo.svg" alt="LaBelle Bakery Logo" width="150" height="150" style="vertical-align: middle; margin-right: 10px;">
      </h1>
      <nav class="nav">
        <a href="../pages/about_page.html">About</a>
        <a href="../pages/menu_page.html">Menu</a>
        <a href="../pages/contact_page.html">Contact</a>
        <a href="../pages/specials_page.html">Specials</a>
        <a href="../pages/home_page.html">Home</a>
      </nav>
    </div>
  </header>

  <footer class="site-footer">
    <div class="container">
      <p>© LaBelle Bakery — Fresh every day.</p>
    </div>
  </footer>

   <script>
    const orderLink = document.getElementById('order-link');
    const logoutBtn = document.getElementById('logoutBtn');

    // Show logout button if user is logged in
    if(localStorage.getItem('loggedIn') === 'true'){
      logoutBtn.style.display = 'inline';
    }

    // Redirect to login page if user clicks Order and is not logged in
    orderLink.addEventListener('click', function(event){
      if(localStorage.getItem('loggedIn') !== 'true'){
        event.preventDefault(); // prevent default navigation
        window.location.href = 'login.html'; // redirect to login page
      }
      // else proceed to order_page.html
    });

    // Logout button functionality
    logoutBtn.addEventListener('click', function(){
      localStorage.removeItem('loggedIn');
      window.location.href = 'login.html'; // optional redirect to login page
    });
  </script>

</body>
</html>
