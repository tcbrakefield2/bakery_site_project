<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order | LaBelle Bakery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="../styles/favicon.svg">

<link rel="stylesheet" href="../styles/layout.css">
</head>

<body>

<header class="site-header">
<div class="container d-flex justify-content-between align-items-center">

<a href="../index.html">
<img src="../styles/logo.svg" width="150">
</a>

<nav class="nav">
<a href="about-page.html">About</a>
<a href="menu-page.html">Menu</a>
<a href="contact-page.html">Contact</a>
<a href="specials-page.html">Specials</a>
<a href="order-page.html" id="order-link">Order</a>
</nav>

</div>
</header>

<main class="py-5">

<div class="container">

<h2 class="text-center mb-5">Place Your Order</h2>

<div class="row">

<!-- MENU ITEMS -->
<div class="col-lg-8">

<div class="row g-4">

<!-- Item -->
<div class="col-md-6">
<div class="card p-3 shadow-sm">

<h5>Butter Croissant</h5>
<p>$3.25</p>

<div class="d-flex gap-2">
<input type="number" min="1" value="1" class="form-control quantity">
<button class="btn btn-sm btn-dark add-btn"
data-name="Butter Croissant"
data-price="3.25">
Add
</button>
</div>

</div>
</div>

<div class="col-md-6">
<div class="card p-3 shadow-sm">

<h5>Chocolate Chip Cookie</h5>
<p>$2.50</p>

<div class="d-flex gap-2">
<input type="number" min="1" value="1" class="form-control quantity">
<button class="btn btn-sm btn-dark add-btn"
data-name="Chocolate Chip Cookie"
data-price="2.50">
Add
</button>
</div>

</div>
</div>

<div class="col-md-6">
<div class="card p-3 shadow-sm">

<h5>Red Velvet Cake Slice</h5>
<p>$6.00</p>

<div class="d-flex gap-2">
<input type="number" min="1" value="1" class="form-control quantity">
<button class="btn btn-sm btn-dark add-btn"
data-name="Red Velvet Cake"
data-price="6.00">
Add
</button>
</div>

</div>
</div>

<div class="col-md-6">
<div class="card p-3 shadow-sm">

<h5>Latte</h5>
<p>$4.50</p>

<div class="d-flex gap-2">
<input type="number" min="1" value="1" class="form-control quantity">
<button class="btn btn-sm btn-dark add-btn"
data-name="Latte"
data-price="4.50">
Add
</button>
</div>

</div>
</div>

</div>
</div>

<!-- ORDER SUMMARY -->
<div class="col-lg-4">

<div class="order-summary">

<h4>Your Order</h4>

<ul id="orderList" class="list-unstyled"></ul>

<hr>

<h5>Total: $<span id="totalPrice">0.00</span></h5>

<button class="btn btn-success w-100 mt-3">
Checkout
</button>

</div>

</div>

</div>
</div>
</main>

<footer class="site-footer">
<div class="container">
<p>© LaBelle Bakery — The Beauty of Handmade.</p>
</div>
</footer>

<script src="../scripts/order-calc.js"></script>

</body>
</html>
